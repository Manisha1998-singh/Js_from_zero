<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <p class="price">10</p>
    <p class="price">11</p>
    <p class="price">12</p>
    <div id="result"></div>
    <button class="btnClick">Click Me</button>

    <script>
      //💡 Tip:

      //If you want to keep it as a numeric value (for calculations etc.),
      //store it in a variable before appending it to the DOM:

      $(document).ready(function () {
        $(".btnClick").click(function () {
          $(".price").each(function (i, element) {
            //✅ Conclusion:
            //Before appending → it’s a number
            //After appending → it becomes a string (HTML text)
            $("#result").append("<p>" + Number($(element).text()) + "</p>");
          });
        });
      });
    </script>
  </body>
</html>
